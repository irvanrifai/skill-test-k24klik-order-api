global:
  scrape_interval: 15s # Sesuai requirement soal 
  evaluation_interval: 15s # Sesuai requirement soal 
  external_labels:
    env: 'production'
    app: 'k24klik'

# Mengarahkan alert ke Alertmanager [cite: 75]
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules untuk alert [cite: 75, 76]
rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: 'k24klik-monitoring'
    static_configs:
      - targets: 
          - 'prometheus:9090'
          - 'node-exporter:9100'
          - 'cadvisor:8080' # Port internal container cadvisor
          - 'alertmanager:9093'
          - 'redis-exporter:9121' # Bonus redis-exporter [cite: 68]